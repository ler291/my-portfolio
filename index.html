<div class="toolbar">
  <input type="text" id="search" placeholder="Search username or owner..." oninput="renderTable()">
  <select id="filter-status" onchange="renderTable()">
    <option value="all">All Status</option>
    <option value="Safe">Safe</option>
    <option value="At Risk">At Risk</option>
    <option value="Compromised">Compromised</option>
  </select>
  <button class="add-btn" onclick="openModal()">+ Add Account</button>
  <button class="copy-btn" onclick="exportData()">⬇ Export</button>
  <button class="copy-btn" onclick="document.getElementById('import-file').click()">⬆ Import</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
</div>
