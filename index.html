<!DOCTYPE html>
<html>
<head>
  <title>NullDefender - Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1d21;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* LOGIN CARD - KAMUKHA NG NASA SCREENSHOT MO */
   .login-card {
      background: #2c2f33;
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      padding: 40px 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
   .brand-title {
      color: #ffffff;
      font-size: 36px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
   .admin-text {
      color: #ffffff;
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 32px;
    }
   .form-label {
      display: block;
      color: #b9bbbe;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      margin-top: 16px;
    }
   .form-input {
      width: 100%;
      padding: 12px 14px;
      background: #232529;
      border: 2px solid #40444b;
      border-radius: 6px;
      color: #dcddde;
      font-size: 16px;
      height: 48px;
    }
   .form-input:focus {
      outline: none;
      border-color: #00a8ff;
    }
   .form-input::placeholder {
      color: #72767d;
    }
   .password-wrapper {
      position: relative;
    }
   .eye-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #72767d;
      font-size: 20px;
    }
   .login-button {
      width: 100%;
      padding: 12px;
      background: #00a8ff;
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      height: 48px;
      margin-top: 24px;
      transition: background 0.2s;
    }
   .login-button:hover { background: #0091db; }
   .login-button:active { background: #0077b3; }
   .error-text {
      color: #ed4245;
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
      min-height: 20px;
    }

    /* DASHBOARD - YUNG LOOB PAG NAKA-LOGIN NA */
   .hidden { display: none; }
   .dashboard {
      background: #2c2f33;
      width: 100%;
      max-width: 900px;
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
   .dash-header {
      background: #1a1d21;
      padding: 20px 24px;
      border-bottom: 1px solid #40444b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px 8px 0 0;
    }
   .dash-header h3 { color: #fff; font-size: 20px; }
   .logout-btn {
      background: #40444b; border: none; color: #fff;
      padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600;
    }
   .dash-body { padding: 24px; }
   .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
   .toolbar input,.toolbar select {
      flex: 1; min-width: 150px; padding: 10px 12px;
      background: #232529; border: 2px solid #40444b;
      border-radius: 6px; color: #dcddde; height: 44px;
    }
   .add-btn {
      padding: 10px 20px; background: #00a8ff; border: none;
      border-radius: 6px; color: #fff; font-weight: 700; cursor: pointer; height: 44px;
    }
   .accounts-table { width: 100%; border-collapse: collapse; }
   .accounts-table th {
      text-align: left; padding: 12px; background: #1a1d21;
      font-size: 12px; text-transform: uppercase; color: #b9bbbe;
      border-bottom: 2px solid #40444b;
    }
   .accounts-table td {
      padding: 14px 12px; border-bottom: 1px solid #40444b;
      color: #dcddde; font-size: 14px;
    }
   .accounts-table tr:hover { background: #32353b; }
   .status { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
   .status-safe { background: #3ba55d; color: #fff; }
   .status-risk { background: #faa61a; color: #000; }
   .status-compromised { background: #ed4245; color: #fff; }
   .action-btns { display: flex; gap: 8px; }
   .copy-btn,.delete-btn {
      border: none; padding: 6px 12px; border-radius: 4px;
      cursor: pointer; font-size: 13px; font-weight: 600;
    }
   .copy-btn { background: #40444b; color: #fff; }
   .delete-btn { background: #ed4245; color: #fff; }
   .empty-state { text-align: center; padding: 60px 20px; color: #72767d; }

    /* MODAL */
   .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); display: flex; justify-content: center;
      align-items: center; z-index: 100; padding: 20px;
    }
   .modal-content {
      background: #2c2f33; padding: 28px; border-radius: 8px;
      width: 100%; max-width: 450px;
    }
   .modal-content h4 { color: #fff; margin-bottom: 20px; font-size: 20px; }
   .modal-content input,.modal-content select,.modal-content textarea {
      width: 100%; padding: 12px 14px; background: #232529;
