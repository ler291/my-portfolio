<html>
<head>
  <meta charset="UTF-8">
  <title>NullDefender - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#1a1d21; font-family:Arial; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; padding:20px; }
  .login-card { background:#2c2f33; width:100%; max-width:400px; border-radius:8px; padding:40px 32px; }
  .brand-title { color:#00a8ff; font-size:36px; font-weight:800; text-align:center; margin-bottom:8px; }
  .admin-text { color:#ffffff; font-size:20px; text-align:center; margin-bottom:32px; }
  .form-input { width:100%; padding:12px 14px; background:#1e2124; border:2px solid #40444b; border-radius:6px; color:#dcddde; font-size:16px; box-sizing:border-box; margin-bottom:16px; }
  .login-button { width:100%; padding:12px; background:#00a8ff; border:none; border-radius:6px; color:#ffffff; font-size:16px; font-weight:700; cursor:pointer; }
  .error-text { color:#ed4245; font-size:14px; text-align:center; margin-top:16px; min-height:20px; }
  .hidden { display:none; }
  .dashboard { background:#2c2f33; width:100%; max-width:900px; border-radius:8px; color:#fff; }
  .dash-header { background:#1a1d21; padding:20px 28px; border-bottom:2px solid #00a8ff; display:flex; justify-content:space-between; align-items:center; }
  .dash-body { padding:28px; }
  </style>
</head>
<body>
  <div class="login-card" id="login-box">
    <div class="brand-title">NULLDEFENDER</div>
    <div class="admin-text">Admin Login</div>
    <input type="email" class="form-input" id="email" placeholder="Email">
    <input type="password" class="form-input" id="password" placeholder="Password">
    <button class="login-button" onclick="login()">Log In</button>
    <p class="error-text" id="error"></p>
  </div>

  <div class="dashboard hidden" id="vault-content">
    <div class="dash-header">

      <button onclick="logout()" style="background:#40444b; border:none; color:#fff; padding:10px 20px; border-radius:6px; cursor:pointer;">Log Out</button>
    </div>
    <div class="dash-body">
      <h2 style="margin-top:0;">Welcome! Naka-login ka na.</h2>
      <p>Dito mo na ilagay yung Roblox accounts na prinoprotektahan mo.</p>
    </div>
  </div>
