<!DOCTYPE html>
<html>
<head>
  <title>Login - NullDefender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #232527; 
      color: #fff; 
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 20px;
    }
    /* LOGIN - Roblox Style */
    .login-container { 
      background: #393b3d; 
      width: 100%; 
      max-width: 400px; 
      border-radius: 8px; 
      border: 1px solid #565a5c;
    }
    .login-header { background: #232527; padding: 20px; text-align: center; border-bottom: 1px solid #565a5c; }
    .roblox-logo { font-size: 28px; font-weight: 900; }
    .login-body { padding: 24px; }
    .login-body h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #bdbebe; text-transform: uppercase; }
    .input-group input { width: 100%; padding: 8px 12px; background: #232527; border: 1px solid #565a5c; border-radius: 4px; color: #fff; font-size: 16px; height: 38px; }
    .login-btn { width: 100%; padding: 8px; background: #393b3d; border: 1px solid #565a5c; border-radius: 4px; color: #bdbebe; font-size: 16px; font-weight: 600; cursor: pointer; height: 38px; }
    .login-btn:hover { background: #46494c; }
    .error-msg { color: #f44336; font-size: 14px; text-align: center; margin-top: 12px; min-height: 20px; }
    .footer-text { text-align: center; font-size: 12px; color: #bdbebe; margin-top: 20px; padding: 0 24px 24px 24px; }
    
    /* DASHBOARD - BAGONG LOOB */
    .hidden { display: none; }
    .dashboard { 
      background: #393b3d; 
      width: 100%; 
      max-width: 900px; 
      border-radius: 8px; 
      border: 1px solid #565a5c;
    }
    .dash-header { 
      background: #232527; 
      padding: 16px 20px; 
      border-bottom: 1px solid #565a5c; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .dash-header h3 { font-size: 18px; }
    .dash-stats { display: flex; gap: 20px; font-size: 14px; color: #bdbebe; }
    .dash-stats span { color: #00a2ff; font-weight: 700; }
    .logout-btn { background: #232527; border: 1px solid #565a5c; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .dash-body { padding: 20px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .toolbar input, .toolbar select { 
      flex: 1; min-width: 150px;
      padding: 8px 12px; background: #232527; border: 1px solid #565a5c; border-radius: 4px; color: #fff; 
    }
    .add-btn { padding: 8px 16px; background: #00a2ff; border: none; border-radius: 4px; color: #000; font-weight: 700; cursor: pointer; }
    
    .accounts-table { width: 100%; border-collapse: collapse; }
    .accounts-table th { 
      text-align: left; padding: 12px; background: #232527; 
      font-size: 12px; text-transform: uppercase; color: #bdbebe; border-bottom: 1px solid #565a5c;
    }
    .accounts-table td { padding: 12px; border-bottom: 1px solid #565a5c; font-size: 14px; }
    .accounts-table tr:hover { background: #2f3234; }
    .status { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
    .status-safe { background: #00a2ff; color: #000; }
    .status-risk { background: #ff9800; color: #000; }
    .status-compromised { background: #f44336; color: #fff; }
    .action-btns { display: flex; gap: 6px; }
    .copy-btn, .delete-btn { 
      border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;
    }
    .copy-btn { background: #393b3d; border: 1px solid #565a5c; color: #fff; }
    .delete-btn { background: #f44336; color: #fff; }
    .empty-state { text-align: center; padding: 40px; color: #7d8590; }
    
    /* MODAL */
    .modal { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100;
    }
    .modal-content { 
      background: #393b3d; padding: 24px; border-radius: 8px; 
      width: 90%; max-width: 400px; border: 1px solid #565a5c;
    }
    .modal-content h4 { margin-bottom: 16px; }
    .modal-content input, .modal-content select, .modal-content textarea { 
      width: 100%; padding: 8px 12px; background: #232527; border: 1px solid #565a5c; 
      border-radius: 4px; color: #fff; margin-bottom: 12px; font-family: inherit;
    }
    .modal-btns { display: flex; gap: 10px; margin-top: 10px; }
    .modal-btns button { flex: 1; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .btn-save { background: #00a2ff; border: none; color: #000; }
    .btn-cancel { background: #393b3d; border: 1px solid #565a5c; color: #fff; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-container" id="login-box">
    <div class="login-header">
      <div class="roblox-logo">🛡️ NullDefender</div>
    </div>
    <div class="login-body">
      <h2>Log In to Your Account</h2>
      <div class="input-group">
        <label>Username</label>
        <input type="text" value="NullDefenderAdmin" disabled>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>
      <button class="login-btn" onclick="unlock()">Log In</button>
      <p class="error-msg" id="error"></p>
    </div>
    <div class="footer-text">Private Database - Not affiliated with Roblox Corporation</div>
  </div>

  <!-- DASHBOARD - BAGONG LOOB -->
  <div class="dashboard hidden" id="vault-content">
    <div class="dash-header">
      <h3>NullDefender Database</h3>
      <div class="dash-stats">
        Total: <span id="total-count">0</span> | 
        Safe: <span id="safe-count">0</span>
      </div>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
    <div class="dash-body">
      <div class="toolbar">
        <input type="text" id="search" placeholder="Search username..." oninput="renderTable()">
        <select id="filter-status" onchange="renderTable()">
          <option value="all">All Status</option>
          <option value="Safe">Safe</option>
          <option value="At Risk">At Risk</option>
          <option value="Compromised">Compromised</option>
        </select>
        <button class="add-btn" onclick="openModal()">+ Add Account</button>
      </div>
      
      <table class="accounts-table">
        <thead>
          <tr>
            <th>Roblox Username</th>
            <th>Owner / Notes</th>
            <th>Date Added</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="accounts-body"></tbody>
      </table>
      <div id="empty-state" class="empty-state hidden">No accounts found. Add ka muna.</div>
    </div>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div class="modal hidden" id="modal">
    <div class="modal-content">
      <h4 id="modal-title">Add Protected Account</h4>
      <input type="text" id="modal-username" placeholder="Roblox Username">
      <input type="text" id="modal-owner" placeholder="Owner / Real Name">
      <select id="modal-status">
        <option value="Safe">Safe</option>
        <option value="At Risk">At Risk</option>
        <option value="Compromised">Compromised</option>
      </select>
      <textarea id="modal-notes" rows="3" placeholder="Notes: Email, last checked, etc."></textarea>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveAccount()">Save</button>
      </div>
    </div>
  </div>

<script>
  // === CONFIG ===
  const CORRECT_PASS = "wilbert123"; // Palitan mo to
  let editIndex = null;
  // === END CONFIG ===

  if(localStorage.getItem("nd_session") === "true") {
    showDashboard();
    renderTable();
  }

  function unlock() {
    const pass = document.getElementById("password").value;
    if(pass === CORRECT_PASS) {
      localStorage.setItem("nd_session", "true");
      showDashboard();
      renderTable();
    } else {
      document.getElementById("error").innerText = "Incorrect username or password.";
    }
  }

  function logout() {
    localStorage.removeItem("nd_session");
    document.getElementById("login-box").classList.remove("hidden");
    document.getElementById("vault-content").classList.add("hidden");
    document.getElementById("password").value = "";
  }

  function showDashboard() {
    document.getElementById("login-box").classList.add("hidden");
    document.getElementById("vault-content").classList.remove("hidden");
  }

  function getAccounts() {
    return JSON.parse(localStorage.getItem("nd_accounts") || "[]");
  }

  function saveAccounts(accounts) {
    localStorage.setItem("nd_accounts", JSON.stringify(accounts));
