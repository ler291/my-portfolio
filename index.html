<!DOCTYPE html>
<html>
<head>
  <title>Login - NullDefender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #232527; 
      color: #fff; 
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 20px;
    }
    .login-container { 
      background: #393b3d; 
      width: 100%; 
      max-width: 400px; 
      border-radius: 8px; 
      overflow: hidden;
      border: 1px solid #565a5c;
    }
    .login-header {
      background: #232527;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #565a5c;
    }
    .roblox-logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
    }
    .roblox-logo span { color: #fff; }
    .login-body { padding: 24px; }
    .login-body h2 { 
      font-size: 20px; 
      font-weight: 700; 
      margin-bottom: 20px; 
      text-align: center;
    }
    .input-group { margin-bottom: 16px; }
    .input-group label { 
      display: block; 
      font-size: 12px; 
      font-weight: 600; 
      margin-bottom: 6px; 
      color: #bdbebe;
      text-transform: uppercase;
    }
    .input-group input { 
      width: 100%; 
      padding: 8px 12px; 
      background: #232527; 
      border: 1px solid #565a5c; 
      border-radius: 4px; 
      color: #fff; 
      font-size: 16px;
      height: 38px;
    }
    .input-group input:focus { 
      outline: none; 
      border-color: #00a2ff; 
    }
    .login-btn { 
      width: 100%; 
      padding: 8px; 
      background: #393b3d; 
      border: 1px solid #565a5c; 
      border-radius: 4px; 
      color: #bdbebe; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer; 
      height: 38px;
      margin-top: 8px;
    }
    .login-btn:hover { background: #46494c; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { 
      color: #f44336; 
      font-size: 14px; 
      text-align: center; 
      margin-top: 12px; 
      min-height: 20px;
    }
    .footer-text { 
      text-align: center; 
      font-size: 12px; 
      color: #bdbebe; 
      margin-top: 20px;
      padding: 0 24px 24px 24px;
    }
    .footer-text a { color: #00a2ff; text-decoration: none; }
    
    /* Vault Content */
    .hidden { display: none; }
    .vault-container { 
      background: #393b3d; 
      width: 100%; 
      max-width: 500px; 
      border-radius: 8px; 
      border: 1px solid #565a5c;
    }
    .vault-header { 
      background: #232527; 
      padding: 16px 20px; 
      border-bottom: 1px solid #565a5c; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .vault-header h3 { font-size: 18px; }
    .logout-btn { 
      background: #232527; 
      border: 1px solid #565a5c; 
      color: #fff; 
      padding: 6px 12px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 14px;
    }
    .vault-body { padding: 20px; }
    .vault-body h4 { 
      color: #00a2ff; 
      margin: 16px 0 10px 0; 
      font-size: 14px;
      text-transform: uppercase;
    }
    .vault-body input, .vault-body textarea { 
      width: 100%; 
      padding: 8px 12px; 
      background: #232527; 
      border: 1px solid #565a5c; 
      border-radius: 4px; 
      color: #fff; 
      margin: 6px 0; 
      font-family: inherit;
    }
    .add-btn { 
      width: 100%; 
      padding: 8px; 
      background: #00a2ff; 
      border: none; 
      border-radius: 4px; 
      color: #000; 
      font-weight: 700; 
      cursor: pointer; 
      margin: 8px 0 16px 0;
    }
    .entry { 
      background: #232527; 
      border: 1px solid #565a5c; 
      padding: 12px; 
      border-radius: 4px; 
      margin: 8px 0; 
    }
    .entry-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 6px; 
    }
    .entry-title { font-weight: 700; }
    .delete-btn { 
      background: #f44336; 
      border: none; 
      color: white; 
      padding: 4px 8px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 12px;
    }
    .badge { 
      background: #00a2ff; 
      color: #000; 
      font-size: 10px; 
      padding: 2px 6px; 
      border-radius: 10px; 
      margin-left: 6px; 
      font-weight: 700;
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN - KAMUKHA NG ROBLOX -->
  <div class="login-container" id="login-box">
    <div class="login-header">
      <div class="roblox-logo">🛡️ <span>NullDefender</span></div>
    </div>
    <div class="login-body">
      <h2>Log In to Your Account</h2>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" value="wilbert" disabled>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>
      <button class="login-btn" onclick="unlock()">Log In</button>
      <p class="error-msg" id="error"></p>
    </div>
    <div class="footer-text">
      This is a private vault. Not affiliated with Roblox Corporation.<br>
      FOR PERSONAL USE ONLY
    </div>
  </div>

  <!-- VAULT CONTENT -->
  <div class="vault-container hidden" id="vault-content">
    <div class="vault-header">
      <h3>🛡️ Protected Accounts</h3>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
    <div class="vault-body">
      <h4>Roblox Usernames</h4>
      <input type="text" id="rbx-user" placeholder="Roblox Username">
      <textarea id="rbx-note" rows="2" placeholder="Notes: Status, owner, date"></textarea>
      <button class="add-btn" onclick="addRbx()">Add Account</button>
      <div id="rbx-list"></div>

      <h4>Other Notes</h4>
      <input type="text" id="note-title" placeholder="Title">
      <textarea id="note-body" rows="2" placeholder="Details"></textarea>
      <button class="add-btn" onclick="addNote()">Add Note</button>
      <div id="notes-list"></div>
    </div>
  </div>

<script>
  // === CONFIG MO DITO ===
  const CORRECT_PASS = "wilbert123"; // Palitan mo to ng password na gusto mo
  const DEFAULT_RBX = [
    { title: "PlayerOne", body: "Main account - Protected since April 2026" },
    { title: "AltAccount22", body: "Kaibigan ko - Status: Safe" }
  ];
  // === END CONFIG ===

  if(localStorage.getItem("nd_session") === "true") {
    showVault();
    initData();
    loadAll();
  }

  function unlock() {
    const pass = document.getElementById("password").value;
    const btn = document.querySelector('.login-btn');
    btn.disabled = true;
    btn.innerText = "Logging in...";
    
    setTimeout(() => { // Fake loading para realistic
      if(pass === CORRECT_PASS) {
        localStorage.setItem("nd_session", "true");
        showVault();
        initData();
        loadAll();
      } else {
        document.getElementById("error").innerText = "Incorrect username or password.";
        btn.disabled = false;
        btn.innerText = "Log In";
      }
    }, 800);
  }

  function logout() {
    localStorage.removeItem("nd_session");
    document.getElementById("login-box").classList.remove("hidden");
    document.getElementById("vault-content").classList.add("hidden");
    document.getElementById("password").value = "";
    document.getElementById("error").innerText = "";
  }

  function showVault() {
    document.getElementById("login-box").classList.add("hidden");
    document.getElementById("vault-content").classList.remove("hidden");
  }

  function initData() {
    if(!localStorage.getItem("nd_rbx")) {
      localStorage.setItem("nd_rbx", JSON.stringify(DEFAULT_RBX));
    }
    if(!localStorage.getItem("nd_notes")) {
      localStorage.setItem("nd_notes", JSON.stringify([]));
    }
  }

  function getData(key) {
    return JSON.parse(localStorage.getItem(key) || "[]");
  }

  function saveData(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
  }

  function loadAll() {
    loadList("nd_rbx", "rbx-list", "rbx");
    loadList("nd_notes", "notes-list", "note");
  }

  function loadList(storageKey, listId, type) {
    const items = getData(storageKey);
    const list = document.getElementById(listId);
    list.innerHTML = "";
    
    if(items.length === 0) {
      list.innerHTML = "<p style='text-align: center; color: #7d8590; font-size: 14px;'>No entries.</p>";
      return;
    }

    items.forEach((item, index) => {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <div class="entry-header">
          <span class="entry-title">${item.title} ${type === 'rbx' ? '<span class="badge">PROTECTED</span>' : ''}</span>
          <button class="delete-btn" onclick="deleteItem('${storageKey}', ${index})">Delete</button>
        </div>
        <div>${item.body}</div>
      `;
      list.appendChild(div);
    });
  }

  function addRbx() {
    addItem("nd_rbx", "rbx-user", "rbx-note", "rbx-list", "rbx");
  }

  function addNote() {
    addItem("nd_notes", "note-title", "note-body", "notes-list", "note");
  }

  function addItem(storageKey, titleId, bodyId, listId, type) {
    const title = document.getElementById(titleId).value.trim();
    const body = document.getElementById(bodyId).value.trim();
    
    if(!title || !body) return;

    const items = getData(storageKey);
    items.unshift({ title, body });
    saveData(storageKey, items);
    
    document.getElementById(titleId).value = "";
    document.getElementById(bodyId).value = "";
    loadList(storageKey, listId, type);
  }

  function deleteItem(storageKey, index) {
    if(!confirm("Delete this entry?")) return;
    const items = getData(storageKey);
    const type = storageKey === "nd_rbx" ? "rbx" : "note";
    const listId = storageKey === "nd_rbx" ? "rbx-list" : "notes-list";
    items.splice(index, 1);
    saveData(storageKey, items);
    loadList(storageKey, listId, type);
  }

  // Enter key para mag-login
  document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") unlock();
  });
</script>
</body>
</html>
