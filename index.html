<!DOCTYPE html>
<html>
<head>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Secure Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    /* Animated background circles */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: float 6s ease-in-out infinite;
    }
    body::before {
      width: 300px;
      height: 300px;
      top: -150px;
      left: -150px;
    }
    body::after {
      width: 200px;
      height: 200px;
      bottom: -100px;
      right: -100px;
      animation-delay: -3s;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    .container {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 40px 35px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      z-index: 1;
    }
    h2 {
      color: white;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      color: rgba(255,255,255,0.8);
      text-align: center;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .input-group {
      margin-bottom: 18px;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }
    input::placeholder { color: rgba(255,255,255,0.7); }
    input:focus {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: white;
      border: none;
      border-radius: 12px;
      color: #667eea;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    #error {
      color: #ff6b6b;
      text-align: center;
      font-size: 14px;
      margin-top: 15px;
      font-weight: 500;
    }
    .hidden { display: none; }
    
    /* Dashboard styles */
    .header {
      text-align: center;
      margin-bottom: 25px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 14px;
      text-align: center;
    }
    .stat-box span {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
    }
    .stat-box h3 {
      color: white;
      font-size: 20px;
      margin-top: 5px;
    }
    .user-list {
      background: rgba(0,0,0,0.2);
      border-radius: 14px;
      padding: 18px;
      margin: 20px 0;
      max-height: 220px;
      overflow-y: auto;
    }
    .list-title {
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .user-item:last-child { border-bottom: none; }
    .user-item span { color: white; font-size: 14px; }
    .badge {
      background: #10b981;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .logout {
      background: rgba(239, 68, 68, 0.9);
      color: white;
    }
    .logout:hover { background: rgba(220, 38, 38, 1); }
    
    /* Scrollbar */
    .user-list::-webkit-scrollbar { width: 5px; }
    .user-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-card" class="container">
    <h2>🔐 Secure Portal</h2>
    <p class="subtitle">Enter credentials to access center</p>
    <div class="input-group">
      <input type="text" id="username" placeholder="Username">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
    </div>
    <button class="btn" onclick="doLogin()">Access Now</button>
    <p id="error"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="container hidden">
    <div class="header">
      <h2>🛡️ Account Center</h2>
      <p class="subtitle">Welcome, <strong id="user-display">Admin</strong></p>
    </div>
    
    <div class="stats-grid">
      <div class="stat-box">
        <span>SECURED</span>
        <h3>7</h3>
      </div>
      <div class="stat-box">
        <span>STATUS</span>
        <h3>Active</h3>
      </div>
    </div>
    
    <div class="user-list">
      <div class="list-title">PROTECTED ACCOUNTS</div>
      
      <!-- PALITAN MO MGA USERNAME DITO -->
      <div class="user-item">
        <span>ShadowStriker_X</span>
        <span class="badge">LIVE</span>
      </div>
      <div class="user-item">
        <span>PixelMaster99</span>
        <span class="badge">LIVE</span>
      </div>
      <div class="user-item">
        <span>DarkPhoenixPH</span>
        <span class="badge">LIVE</span>
      </div>
      <div class="user-item">
        <span>NeoBlade_2026</span>
        <span class="badge">LIVE</span>
      </div>
      <div class="user-item">
        <span>FrostQueenQC</span>
        <span class="badge">LIVE</span>
      </div>
      <div class="user-item">
        <span>VortexGamer7</span>
        <span class="badge">LIVE</span>
      </div>
      <div class="user-item">
        <span>AlphaWolf_King</span>
        <span class="badge">LIVE</span>
      </div>
    </div>
    
    <button class="btn logout" onclick="doLogout()">End Session</button>
  </div>

<script>
  function doLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    
    // Login: admin / 1234
    if(user === "admin" && pass === "09483132031") {
      document.getElementById('login-card').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('user-display').innerText = user;
      document.getElementById('error').innerText = "";
    } else {
      document.getElementById('error').innerText = "Invalid credentials. Try again.";
    }
  }

  function doLogout() {
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('login-card').classList.remove('hidden');
    document.getElementById('username').value = "";
    document.getElementById('password').value = "";
  }
  
  // Enter key para mag-login
  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>

</body>
</html>
